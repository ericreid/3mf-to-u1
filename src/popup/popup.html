<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3MF to U1 Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="header-brand">
            <span class="brand-source">Any 3MF</span>
            <span class="divider"></span>
            <span class="brand-target">Snapmaker U1</span>
        </div>
        <h1>3MF <span class="accent">Converter</span></h1>
    </div>

    <div class="card">
        <!-- Drop zone for manual file selection -->
        <div id="drop-zone-state" class="card-body hidden">
            <label for="file-upload" id="drop-zone" class="drop-zone">
                <div class="drop-zone-icon"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
                <p class="drop-zone-label"><strong>Drop a .3mf file</strong> or click to browse</p>
                <p class="drop-zone-hint">.3mf only</p>
                <input id="file-upload" type="file" class="hidden" accept=".3mf" />
            </label>
        </div>

        <!-- Loading state -->
        <div id="loading-state" class="card-body loading-state hidden">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <span id="loading-text">Analyzing file...</span>
        </div>

        <!-- Already U1 state -->
        <div id="already-u1-state" class="card-body hidden">
            <div class="already-u1-banner">
                <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
                <div>
                    <strong>Already Snapmaker U1</strong>
                    <p>This file is already configured for the Snapmaker U1. No conversion needed.</p>
                </div>
            </div>
            <div id="u1-actions" class="actions-bar" style="border-top:none;padding-top:0.5rem">
                <button id="btn-u1-download" class="btn-convert hidden" style="flex:none;padding:0.6rem 1.2rem;font-size:0.9rem">
                    <i class="fa-solid fa-download" aria-hidden="true"></i> Download
                </button>
                <button id="btn-adjust-anyway" class="btn-new">
                    <i class="fa-solid fa-sliders" style="font-size:0.9rem" aria-hidden="true"></i> Adjust colors
                </button>
                <button id="btn-close-u1" class="btn-new">
                    <i class="fa-solid fa-xmark" style="font-size:0.9rem" aria-hidden="true"></i> Close
                </button>
            </div>
        </div>

        <!-- Error state -->
        <div id="error-state" class="card-body hidden">
            <div class="error-banner visible">
                <i class="fa-solid fa-circle-exclamation" style="flex-shrink:0"></i>
                <span id="error-message" style="flex:1"></span>
            </div>
            <div class="actions-bar" style="border-top:none;padding-top:0">
                <button id="btn-close-error" class="btn-new">
                    <i class="fa-solid fa-xmark" style="font-size:0.9rem"></i> Close
                </button>
            </div>
        </div>

        <!-- Mapping UI -->
        <div id="mapping-ui" class="hidden">
            <!-- Inline error for conversion failures -->
            <div id="convert-error" class="error-banner" aria-live="assertive" aria-atomic="true" style="margin:0.75rem 1.75rem">
                <i class="fa-solid fa-circle-exclamation" style="flex-shrink:0" aria-hidden="true"></i>
                <span id="convert-error-msg" style="flex:1"></span>
                <button id="convert-error-dismiss" aria-label="Dismiss error" style="background:none;border:none;color:var(--red);cursor:pointer;padding:2px;margin-left:auto;opacity:0.6">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
            </div>

            <!-- Output: Printer Slots -->
            <div class="section-label"><i class="fa-solid fa-print"></i> U1 Printer Slots</div>
            <div id="slots-strip" class="slots-strip"></div>

            <hr class="section-divider">

            <!-- Input: File Colors -->
            <div class="section-label"><i class="fa-solid fa-palette"></i> Input File Colors <span id="route-hint" style="font-weight:400;letter-spacing:0.04em;margin-left:4px"></span></div>
            <div id="input-list" class="input-list"></div>

            <div class="actions-bar">
                <button id="btn-convert" class="btn-convert">
                    <i id="convert-icon" class="fa-solid fa-bolt"></i>
                    <span id="convert-label">Convert &amp; Download</span>
                </button>
                <button id="btn-original" class="btn-new">
                    <i class="fa-solid fa-download" style="font-size:0.9rem"></i> Original
                </button>
                <button id="btn-cancel" class="btn-new">
                    <i class="fa-solid fa-xmark" style="font-size:0.9rem"></i> Cancel
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://buymeacoffee.com/ericreid" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-mug-hot" aria-hidden="true"></i> Buy me a coffee
        </a>
    </div>
</div>

<!-- Load libs (popup has full DOM access for DOMParser/XMLSerializer) -->
<script src="../../vendor/jszip.min.js"></script>
<script src="../lib/constants.js"></script>
<script src="../lib/color-utils.js"></script>
<script src="../lib/filament-profiles.js"></script>
<script src="../lib/template-settings.js"></script>
<script src="../lib/analyzer.js"></script>
<script src="../lib/converter.js"></script>
<script src="../lib/file-store.js"></script>
<script src="popup.js"></script>
</body>
</html>
