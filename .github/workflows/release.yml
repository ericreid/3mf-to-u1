name: Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
